<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaboration Globale | Formulaire d'Inscription</title>

    <!-- GSAP + DrawSVG plugin (nécessaire pour drawSVG) -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>

    
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
    </style>
</head>
<body>

    <!-- ═══════════ POPUP CONFIRMATION ═══════════ -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content">
            <h2> Confirmation de ton profil</h2>
            <p style="opacity:.6; font-size:13px; margin-top:4px;">Vérifie tes informations avant validation</p>
            <div id="previewData"></div>
            <div class="modal-actions">
                <button id="editBtn">✏️ Modifier</button>
                <button id="confirmBtn">✅ Confirmer</button>
            </div>
        </div>
    </div>

    <!-- ═══════════ THANK YOU OVERLAY ═══════════ -->
    <div id="thankYou" class="hidden">
        <div class="ty-inner">
            <svg id="svg-stage" xmlns="http://www.w3.org/2000/svg" viewBox="-1 -1 103 103">
                <defs>
                    <linearGradient id="grad-1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                        <stop offset=".2" stop-color="rgb(255,135,9)"/>
                        <stop offset=".8" stop-color="rgb(247,189,248)"/>
                    </linearGradient>
                </defs>
                <path stroke="url(#grad-1)"
                      d="M50.5 50.5h50v50s-19.2 1.3-37.2-16.7S56 35.4 35.5 15.5C18.5-1 .5.5.5.5v50h50s25.6-.6 38-18 12-32 12-32h-50v100H.5S.2 80.7 11.8 68.2 40 49.7 50.5 50.5Z"/>
            </svg>
            <h1 id="thankYouTitle">Merci pour ton inscription ✨</h1>
        </div>
    </div>

    <!-- ═══════════ MAIN CARD ═══════════ -->
    <div class="page-container">

        <div class="illustration-side">
            <h1>Rejoins Notre Communauté Globale</h1>
            <p>Construisons ensemble le futur de la tech au Sénégal et ailleurs.</p>
            <img src="/images/photo.png"
                 alt="Collaboration Globale">
            <h1 style="color:#212529; margin-top:25px; font-size:24px;">COLLABORATION GLOBALE</h1>
        </div>

        <div class="form-side">
            <form id="form" novalidate>

                <div class="form-row" style="display:flex; gap:20px;">
                    <div class="form-group" style="flex:1;">
                        <label for="firstName">Prénom <span style="color:red;">*</span></label>
                        <input type="text" id="firstName" placeholder="Aïssatou">
                        <div class="error-message"></div>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label for="lastName">Nom <span style="color:red;">*</span></label>
                        <input type="text" id="lastName" placeholder="Diop">
                        <div class="error-message"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email <span style="color:red;">*</span></label>
                    <input type="email" id="email" placeholder="exemple@domaine.com">
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="domain">Domaine de prédilection <span style="color:red;">*</span></label>
                    <select id="domain">
                        <option value="">Sélectionne ton domaine...</option>
                        <option value="Front-End">Front-End</option>
                        <option value="Back-End">Back-End</option>
                        <option value="Design / UX">Design / UX</option>
                        <option value="Data / IA">Data / IA</option>
                    </select>
                    <div class="error-message"></div>
                </div>

                <div class="form-group" id="radioGroup">
                    <label>Tu es plutôt... <span style="color:red;">*</span></label>
                    <div style="display:flex; gap:25px; margin-top:8px;">
                        <label style="display:flex;align-items:center;gap:6px;color:#fff;">
                            <input type="radio" name="rythme" value="Matin"> Matin
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;color:#fff;">
                            <input type="radio" name="rythme" value="Nuit"> Nuit
                        </label>
                    </div>
                    <div class="error-message"></div>
                </div>

                <div class="form-group" id="checkboxGroup">
                    <label>Quelles sont tes passions ? (au moins 2) <span style="color:red;">*</span></label>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:8px; color:#fff;">
                        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="interets" value="Veille Tech"> Veille Tech</label>
                        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="interets" value="Gaming"> Gaming</label>
                        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="interets" value="Sport"> Sport</label>
                        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="interets" value="Musique"> Musique</label>
                        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" name="interets" value="Lecture"> Lecture</label>
                    </div>
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="bio">Présentation / Ambition <span style="color:red;">*</span></label>
                    <textarea id="bio" rows="4" maxlength="255" placeholder="Raconte-nous une anecdote ou ton ambition..."></textarea>
                    <div class="char-counter" id="charCounter">255 caractères restants</div>
                    <div class="error-message"></div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Soumettre pour créer mon profil</button>
            </form>

            <div id="profileContainer"></div>
        </div>
    </div>


<script src="/js/app.js"></script>
</body>
</html>
